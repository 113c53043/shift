<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排班優化系統</title>
    
    <style>
        html { 
            visibility: hidden; 
            opacity: 0; 
            transition: opacity 0.3s ease; 
        }
        html.tailwind-loaded { 
            visibility: visible; 
            opacity: 1; 
        }
        body {
            font-family: 'Inter', 'Microsoft JhengHei', sans-serif;
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.documentElement.classList.add('tailwind-loaded');
            }, 100); 
        });
    </script>
</head>
<body class="bg-slate-100 text-slate-800 flex items-center justify-center min-h-screen p-4 md:p-8">

    <div class="w-full max-w-5xl bg-white rounded-2xl shadow-xl border border-slate-200 p-6 md:p-10 space-y-8">
        <header class="text-center space-y-2 border-b border-slate-100 pb-6">
            <h1 class="text-2xl md:text-3xl font-extrabold text-slate-900 tracking-tight">排班優化系統</h1>
        </header>

        <main class="space-y-8">
            <div class="bg-slate-50 rounded-xl p-5 border border-slate-200/80 grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <h3 class="text-sm font-semibold text-slate-700 mb-2">當前套用排班（21人基準）</h3>
                    <ul class="text-xs text-slate-500 space-y-1 list-disc pl-4">
                        <li>早班：A班 (3人)、J班 (2人)、O班 (1人)、C班 (1人)</li>
                        <li>中晚班：E班 (3人)、Y班 (2人)、F班 (2人)</li>
                        <li>44RW (每日各1)、IV (每日各1)、2班 (1人)</li>
                        
                    </ul>
                </div>
                
                <div class="flex flex-col justify-center space-y-5 md:border-l md:border-slate-200 md:pl-6">
                    <div class="flex items-center justify-between">
                        <span class="text-sm font-bold text-slate-700">時間標籤顯示開關</span>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="include-time" class="sr-only peer">
                            <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                        </label>
                    </div>
                    <p class="text-xs text-slate-400">開啟顯示 4(22-8)，關閉顯示 4（統計與時數將自動連動）。</p>
                    
                    <div class="pt-3 border-t border-slate-200 space-y-4">
                        <div>
                            <h4 class="text-sm font-bold text-slate-700 mb-2 flex items-center">
                                <svg class="w-4 h-4 mr-1 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                目標加班時數 <span class="text-xs font-normal text-slate-400 ml-1">(留白代表無限制)</span>
                            </h4>
                            <div class="flex items-center space-x-2 text-sm text-slate-600">
                                <input type="number" id="ot-min" placeholder="無" value="56" class="w-16 px-2 py-1 border border-slate-300 rounded-md text-center focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-semibold text-indigo-700 bg-white shadow-sm placeholder:text-slate-300 placeholder:font-normal">
                                <span>~</span>
                                <input type="number" id="ot-max" placeholder="無" value="58" class="w-16 px-2 py-1 border border-slate-300 rounded-md text-center focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-semibold text-indigo-700 bg-white shadow-sm placeholder:text-slate-300 placeholder:font-normal">
                                <span>小時</span>
                            </div>
                            <p class="text-xs text-rose-500 font-medium mt-2 bg-rose-50 p-1.5 rounded inline-block border border-rose-100">
                                若要求「xx小時以上」，請將右側數字留白。
                            </p>
                        </div>
                        
                        <div>
                            <h4 class="text-sm font-bold text-slate-700 mb-2 flex items-center">
                                <svg class="w-4 h-4 mr-1 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                每人休假上限
                            </h4>
                            <div class="flex items-center space-x-2 text-sm text-slate-600">
                                <input type="number" id="max-leaves" value="9" class="w-16 px-2 py-1 border border-slate-300 rounded-md text-center focus:ring-2 focus:ring-emerald-500 outline-none transition-all font-semibold text-emerald-700 bg-white shadow-sm">
                                <span>天 <span class="text-xs text-slate-400 font-normal"></span></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="file-drop-area" class="border-2 border-dashed border-slate-300 rounded-xl p-8 text-center transition-all duration-300 bg-white hover:border-indigo-500 hover:bg-indigo-50/30 group cursor-pointer relative">
                <label for="file-upload" class="cursor-pointer block w-full h-full">
                    <svg class="mx-auto h-12 w-12 text-slate-400 group-hover:text-indigo-500 transition-colors" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                        <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <span class="mt-3 block text-base font-semibold text-slate-800">點擊選擇 或 將排班原始檔案 (Excel) 拖曳至此</span>
                    <p id="file-name" class="mt-2 text-sm text-slate-400 italic">尚未載入檔案</p>
                </label>
                <input id="file-upload" name="file-upload" type="file" class="sr-only" accept=".xlsx, .xlsm, .xls">
            </div>

            <div id="controls-container" class="space-y-4 hidden text-center">
                <button id="run-schedule-button" class="w-full md:w-2/3 mx-auto bg-indigo-600 text-white font-bold py-3.5 px-6 rounded-xl hover:bg-indigo-700 shadow-lg shadow-indigo-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all flex items-center justify-center space-x-3 text-lg">
                    <div class="spinner h-5 w-5 rounded-full border-2 border-white border-t-transparent animate-spin hidden"></div>
                    <span>開始執行自動排班</span>
                </button>
            </div>

            <div id="result-container" class="space-y-3 hidden">
                <div class="flex justify-between items-center pb-2 border-b border-slate-100">
                    <h3 class="text-base font-bold text-slate-800 flex items-center space-x-2">
                        <span class="inline-block w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
                        <span>每日班別統計：</span>
                    </h3>
                    <div class="flex space-x-3">
                        <button id="download-button" class="hidden text-sm bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-4 rounded-lg shadow transition-colors flex items-center space-x-1">
                            <span>下載 Excel 結果</span>
                        </button>
                        <button id="clear-button" class="text-sm text-slate-500 hover:text-rose-500 font-medium transition-colors">清除狀態</button>
                    </div>
                </div>
                <div id="stats-display" class="w-full h-64 bg-slate-50 text-slate-700 text-sm rounded-xl p-5 border border-slate-200 shadow-inner overflow-y-auto font-mono whitespace-pre-wrap leading-relaxed"></div>
            </div>
        </main>
    </div>

    <script>
    // --- 基礎參數與常數定義 ---
    const dutyCodes = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
    
    const shiftLabels = {
        '2': '2(11-23)', '4': '4(22-8)', 'A': 'A(8-20)', 'C': 'C(9-21)', 'E': 'E(10-22)',
        'F': 'F(12-24)', 'I': 'I(16-2)', 'J': 'J(8-18)', 'O': 'O(8-20)', 'R': 'R(19-3)',
        'V': 'V(13-1)', 'W': 'W(14-24)', 'Y': 'Y(12-22)', 'N': 'N(11-21)'
    };
    
    const shiftEndTimes = {
        '0': 12.0, '1': 25.0, '2': 23.0, '3': 16.0, '4': 32.0, '5': 22.0, '6': 18.0, 
        '7': 17.0, '8': 20.0, '9': 23.0, 'A': 20.0, 'B': 16.0, 'C': 21.0, 'D': 17.0, 
        'E': 22.0, 'F': 24.0, 'G': 24.0, 'H': 32.0, 'I': 26.0, 'J': 18.0, 'K': 20.0, 
        'L': 26.0, 'M': 18.0, 'N': 21.0, 'O': 20.0, 'P': 21.0, 'Q': 23.0, 'R': 27.0, 
        'S': 19.0, 'T': 19.0, 'U': 20.0, 'V': 25.0, 'W': 24.0, 'X': 26.0, 'Y': 22.0, 
        'Z': 32.0, '休': 0.0
    };
    const shiftStartTimes = {
        '0': 8.0, '1': 15.0, '2': 11.0, '3': 12.0, '4': 22.0, '5': 14.0, '6': 9.0,  
        '7': 8.0, '8': 9.0, '9': 15.0, 'A': 8.0, 'B': 8.0, 'C': 9.0, 'D': 9.0, 
        'E': 10.0, 'F': 12.0, 'G': 16.0, 'H': 20.0, 'I': 16.0, 'J': 8.0, 'K': 12.0, 
        'L': 14.0, 'M': 10.0, 'N': 11.0, 'O': 8.0, 'P': 13.0, 'Q': 13.0, 'R': 19.0, 
        'S': 11.0, 'T': 9.0, 'U': 10.0, 'V': 13.0, 'W': 14.0, 'X': 18.0, 'Y': 12.0, 
        'Z': 24.0, '休': 48.0
    };
    
    const shiftDurations = {
        '2': 12, '4': 10, 'A': 12, 'C': 12, 'E': 12, 'F': 12, 'I': 10, 'J': 10, 'O': 12, 'R': 8, 'V': 12, 'W': 10, 'Y': 10, 'N': 10, '休': 0
    };

    // 🌟 定義單日班別容載量 (精準控制比例，主力班別維持 +1~+2 的彈性)
    const maxDailyCapacity = {
        'N': 2, 'C': 2, 'O': 2, 'W': 2, '2': 2, 'V': 2, 'I': 2, 'R': 2,
        'F': 3, '4': 3,
        'A': 5, 'E': 5, // 基準3，最多+2
        'J': 4, 'Y': 4  // 基準2，最多+2
    };

    // --- DOM 元素控制 ---
    const fileUpload = document.getElementById('file-upload');
    const fileNameDisplay = document.getElementById('file-name');
    const fileDropArea = document.getElementById('file-drop-area');
    const controlsContainer = document.getElementById('controls-container');
    const runScheduleButton = document.getElementById('run-schedule-button');
    const resultContainer = document.getElementById('result-container');
    const statsDisplay = document.getElementById('stats-display');
    const clearButton = document.getElementById('clear-button');
    const downloadButton = document.getElementById('download-button');
    const includeTimeCheckbox = document.getElementById('include-time');

    let rawWorkbook = null;
    let excelSheetData = null;
    let finalOutputWorkbook = null;

    fileUpload.addEventListener('change', handleFileSelect);
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evName => fileDropArea.addEventListener(evName, preventDefaults, false));
    ['dragenter', 'dragover'].forEach(evName => fileDropArea.addEventListener(evName, () => fileDropArea.classList.add('border-indigo-500', 'bg-indigo-50/30'), false));
    ['dragleave', 'drop'].forEach(evName => fileDropArea.addEventListener(evName, () => fileDropArea.classList.remove('border-indigo-500', 'bg-indigo-50/30'), false));
    fileDropArea.addEventListener('drop', handleDrop, false);

    function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }

    function handleDrop(e) {
        const files = e.dataTransfer.files;
        if (files.length > 0) {
            fileUpload.files = files;
            handleFileSelect({ target: fileUpload });
        }
    }

    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (file) {
            fileNameDisplay.textContent = `已載入檔案: ${file.name}`;
            fileNameDisplay.classList.replace('text-slate-400', 'text-indigo-600');
            controlsContainer.classList.remove('hidden');
            resultContainer.classList.add('hidden');
            downloadButton.classList.add('hidden');
            statsDisplay.textContent = '';
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    rawWorkbook = XLSX.read(data, { type: 'array', cellStyles: true, cellDates: true });
                    const firstSheetName = rawWorkbook.SheetNames[0];
                    const worksheet = rawWorkbook.Sheets[firstSheetName];
                    excelSheetData = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });
                } catch (err) {
                    alert(`檔案讀取錯誤: ${err.message}`);
                }
            };
            reader.readAsArrayBuffer(file);
        }
    }

    clearButton.addEventListener('click', () => {
        fileUpload.value = '';
        fileNameDisplay.textContent = '尚未載入檔案';
        fileNameDisplay.classList.replace('text-indigo-600', 'text-slate-400');
        controlsContainer.classList.add('hidden');
        resultContainer.classList.add('hidden');
        downloadButton.classList.add('hidden');
        statsDisplay.textContent = '';
        rawWorkbook = null;
        excelSheetData = null;
    });

    runScheduleButton.addEventListener('click', runSchedulingEngine);

    function runSchedulingEngine() {
        if (!excelSheetData) return;
        
        const minInput = document.getElementById('ot-min').value;
        const maxInput = document.getElementById('ot-max').value;
        
        const targetOtMin = minInput === "" ? 0 : parseInt(minInput, 10);
        const targetOtMax = maxInput === "" ? Infinity : parseInt(maxInput, 10);
        const targetMaxLeaves = parseInt(document.getElementById('max-leaves').value, 10) || 9;

        let otTargetText = "";
        if (targetOtMin === 0 && targetOtMax === Infinity) {
            otTargetText = "無限制";
        } else if (targetOtMax === Infinity) {
            otTargetText = `${targetOtMin} 小時以上`;
        } else if (targetOtMin === 0) {
            otTargetText = `${targetOtMax} 小時以下`;
        } else {
            otTargetText = `${targetOtMin} ~ ${targetOtMax} 小時`;
        }

        const includeTime = includeTimeCheckbox.checked;
        const spinner = runScheduleButton.querySelector('.spinner');
        runScheduleButton.disabled = true;
        spinner.classList.remove('hidden');
        
        resultContainer.classList.remove('hidden');
        statsDisplay.textContent = `正在執行全局最大匹配與排班運算\n(目標加班：${otTargetText} | 休假鐵律：不大於 ${targetMaxLeaves} 天)\n請稍候...`;
        
        setTimeout(() => {
            try {
                const headerRow = excelSheetData[0];
                const dateCols = [];
                for (let c = 0; c < headerRow.length; c++) {
                    if (String(headerRow[c]).includes('號')) dateCols.push(c);
                }
                const numDays = dateCols.length;
                const startRow = 2; 
                const numPersonnel = excelSheetData.length - startRow;

                const baoYiIndices = [];
                const kitchenIndices = [];
                const preFilledData = {}; 
                const preFilledLeaveNames = {}; 

                for (let p = 0; p < numPersonnel; p++) {
                    const rIdx = startRow + p;
                    const groupName = String(excelSheetData[rIdx][0] || "");

                    if (groupName.includes("保一")) baoYiIndices.push(p);
                    if (groupName.includes("廚房")) kitchenIndices.push(p);

                    for (let d = 0; d < numDays; d++) {
                        const cellVal = String(excelSheetData[rIdx][dateCols[d]] || "").trim();
                        if (cellVal === "" || cellVal === "nan") continue;
                        
                        const charHead = cellVal[0].toUpperCase();
                        const isShift = dutyCodes.includes(charHead) && (cellVal.length === 1 || cellVal.includes('('));
                        
                        if (isShift && shiftDurations.hasOwnProperty(charHead)) {
                            preFilledData[`${p}_${d}`] = charHead;
                        } else {
                            preFilledData[`${p}_${d}`] = '休'; 
                            preFilledLeaveNames[`${p}_${d}`] = cellVal; 
                        }
                    }
                }

                const scheduleGrid = Array(numPersonnel).fill(null).map(() => Array(numDays).fill('休'));
                
                for (let p = 0; p < numPersonnel; p++) {
                    for (let d = 0; d < numDays; d++) {
                        if (preFilledData.hasOwnProperty(`${p}_${d}`)) {
                            scheduleGrid[p][d] = preFilledData[`${p}_${d}`];
                        } else if (kitchenIndices.includes(p)) {
                            scheduleGrid[p][d] = '休'; 
                        } else {
                            scheduleGrid[p][d] = null; 
                        }
                    }
                }

                const getDailyCount = (d, shiftCode) => {
                    let count = 0;
                    for (let i = 0; i < numPersonnel; i++) {
                        if (scheduleGrid[i][d] === shiftCode) count++;
                    }
                    return count;
                };

                const canTakeShift = (p, d, targetShift) => {
                    if (d > 0 && scheduleGrid[p][d-1] !== null && scheduleGrid[p][d-1] !== '休') {
                        let prev = scheduleGrid[p][d-1];
                        if (shiftEndTimes[prev] !== undefined && shiftStartTimes[targetShift] !== undefined) {
                            if (shiftEndTimes[prev] + 11.0 > shiftStartTimes[targetShift] + 24.0) return false;
                        }
                    }
                    if (d < numDays - 1 && scheduleGrid[p][d+1] !== null && scheduleGrid[p][d+1] !== '休') {
                        let next = scheduleGrid[p][d+1];
                        if (shiftEndTimes[targetShift] !== undefined && shiftStartTimes[next] !== undefined) {
                            if (shiftEndTimes[targetShift] + 11.0 > shiftStartTimes[next] + 24.0) return false;
                        }
                    }
                    return true;
                };

                const dailyQuota = {
                    'A': 3, 'J': 2, 'C': 1, 'E': 3, 'Y': 2, 'W': 1, 'F': 2, '2': 1, 'V': 1, 'I': 1, 'R': 1, '4': 2
                };

                // 4.1 鋪設特殊長輪轉骨牌
                for (let d = 0; d < numDays; d++) {
                    let p4 = -1;
                    for (let p = 0; p < numPersonnel; p++) {
                        if (kitchenIndices.includes(p)) continue;
                        if (p4 !== -1) break;
                        
                        let pathClear = true;
                        const block = ['4', '4', 'R', 'W', '休'];
                        for (let step = 0; step < 5; step++) {
                            const targetDay = d + step;
                            if (targetDay >= numDays) break; 
                            if (scheduleGrid[p][targetDay] !== null && scheduleGrid[p][targetDay] !== block[step]) {
                                pathClear = false; break;
                            }
                        }
                        
                        let has4 = false;
                        for (let t = 0; t < numDays; t++) { if (scheduleGrid[p][t] === '4') has4 = true; }

                        if (pathClear && !has4) {
                            if (baoYiIndices.length > 0 && !baoYiIndices.includes(p) && d % 3 === 0) continue;
                            p4 = p;
                        }
                    }

                    if (p4 !== -1) {
                        const block = ['4', '4', 'R', 'W', '休'];
                        for (let step = 0; step < 5; step++) {
                            if (d + step < numDays) scheduleGrid[p4][d + step] = block[step];
                        }
                    }

                    let pI = -1;
                    for (let p = 0; p < numPersonnel; p++) {
                        if (kitchenIndices.includes(p)) continue;
                        if (pI !== -1) break;

                        let pathClear = true;
                        const block = ['I', 'V', '休'];
                        for (let step = 0; step < 3; step++) {
                            if (d + step < numDays) {
                                if (scheduleGrid[p][d + step] !== null && scheduleGrid[p][d + step] !== block[step]) {
                                    pathClear = false; break;
                                }
                            }
                        }
                        let hasI = false;
                        for (let t = 0; t < numDays; t++) { if (scheduleGrid[p][t] === 'I') hasI = true; }

                        if (d >= 2 && scheduleGrid[p][d - 2] === 'W') pathClear = false;
                        if (pathClear && !hasI) pI = p;
                    }

                    if (pI !== -1) {
                        const block = ['I', 'V', '休'];
                        for (let step = 0; step < 3; step++) {
                            if (d + step < numDays) scheduleGrid[pI][d + step] = block[step];
                        }
                    }
                }

                // 4.1.5 O班全局均分發牌
                let availableO = [];
                let hasO = new Array(numPersonnel).fill(0);
                
                for (let d = 0; d < numDays; d++) {
                    availableO[d] = [];
                    for (let p = 0; p < numPersonnel; p++) {
                        if (kitchenIndices.includes(p)) continue;
                        if (scheduleGrid[p][d] === 'O') hasO[p]++;
                        if (scheduleGrid[p][d] !== null) continue; 
                        if (canTakeShift(p, d, 'O')) availableO[d].push(p);
                    }
                }

                let matchDayToPersonO = new Array(numDays).fill(-1);
                let matchPersonToDayO = new Array(numPersonnel).fill(-1);

                for (let d = 0; d < numDays; d++) {
                    for (let p = 0; p < numPersonnel; p++) {
                        if (scheduleGrid[p][d] === 'O') {
                            matchDayToPersonO[d] = p;
                            matchPersonToDayO[p] = d;
                        }
                    }
                }

                function bpmO(d, visited) {
                    for (let p of availableO[d]) {
                        if (hasO[p] > 0) continue; 
                        if (!visited[p]) {
                            visited[p] = true;
                            if (matchPersonToDayO[p] === -1 || bpmO(matchPersonToDayO[p], visited)) {
                                matchPersonToDayO[p] = d;
                                matchDayToPersonO[d] = p;
                                return true;
                            }
                        }
                    }
                    return false;
                }

                for (let d = 0; d < numDays; d++) {
                    if (matchDayToPersonO[d] === -1) {
                        let visited = new Array(numPersonnel).fill(false);
                        bpmO(d, visited);
                    }
                }

                for (let d = 0; d < numDays; d++) {
                    if (matchDayToPersonO[d] !== -1) {
                        scheduleGrid[matchDayToPersonO[d]][d] = 'O';
                        hasO[matchDayToPersonO[d]] = 1;
                    } else {
                        let bestP = -1;
                        let minO = 999;
                        for (let p = 0; p < numPersonnel; p++) {
                            if (kitchenIndices.includes(p) || scheduleGrid[p][d] !== null) continue;
                            if (!canTakeShift(p, d, 'O')) continue;

                            let currentO = 0;
                            for(let t=0; t<numDays; t++) if(scheduleGrid[p][t] === 'O') currentO++;
                            if (currentO >= 2) continue; 

                            if (currentO < minO) {
                                minO = currentO;
                                bestP = p;
                            }
                        }
                        if (bestP !== -1) {
                            scheduleGrid[bestP][d] = 'O';
                            hasO[bestP]++;
                        }
                    }
                }

                // 4.2 剩餘常規網格隨機局部搜尋與填補
                for (let d = 0; d < numDays; d++) {
                    const currentCounts = {};
                    Object.keys(dailyQuota).forEach(k => currentCounts[k] = 0);
                    for (let p = 0; p < numPersonnel; p++) {
                        if (scheduleGrid[p][d] && currentCounts.hasOwnProperty(scheduleGrid[p][d])) {
                            currentCounts[scheduleGrid[p][d]]++;
                        }
                    }

                    const pool = [];
                    Object.keys(dailyQuota).forEach(s => {
                        const shortfall = dailyQuota[s] - currentCounts[s];
                        for (let i = 0; i < shortfall; i++) pool.push(s);
                    });

                    pool.sort(() => Math.random() - 0.5);

                    for (let p = 0; p < numPersonnel; p++) {
                        if (kitchenIndices.includes(p)) continue;
                        if (scheduleGrid[p][d] !== null) continue; 

                        if (pool.length > 0) {
                            let assigned = false;
                            for (let i = 0; i < pool.length; i++) {
                                const targetShift = pool[i];
                                
                                let mCount = 0;
                                for (let t = 0; t < numDays; t++) { if (scheduleGrid[p][t] === targetShift) mCount++; }
                                if (mCount >= 6) continue;

                                if (d >= 2 && scheduleGrid[p][d-1] === targetShift && scheduleGrid[p][d-2] === targetShift) continue;

                                if (d >= 1 && scheduleGrid[p][d-1] === 'N') {
                                    if (!['A', 'J', 'O', '休'].includes(targetShift)) continue;
                                }

                                if (!canTakeShift(p, d, targetShift)) continue;

                                scheduleGrid[p][d] = targetShift;
                                pool.splice(i, 1);
                                assigned = true;
                                break;
                            }
                            if (!assigned) scheduleGrid[p][d] = '休';
                        } else {
                            scheduleGrid[p][d] = '休';
                        }
                    }
                }

                // 🌟 4.3 絕對休假天數上限強制校正
                for (let p = 0; p < numPersonnel; p++) {
                    if (kitchenIndices.includes(p)) continue;
                    
                    let preLeaves = 0;
                    for (let d = 0; d < numDays; d++) { if (preFilledData[`${p}_${d}`] === '休') preLeaves++; }
                    let actualMaxLeaves = Math.max(targetMaxLeaves, preLeaves);
                    
                    let totalLeaves = 0;
                    for (let d = 0; d < numDays; d++) { if (scheduleGrid[p][d] === '休') totalLeaves++; }
                    
                    let loops = 0;
                    while (totalLeaves > actualMaxLeaves && loops < 50) {
                        let replaced = false;
                        
                        const tryShifts = ['A', 'E', 'J', 'Y', 'F', 'N'];
                        
                        for (let d = 0; d < numDays; d++) {
                            if (scheduleGrid[p][d] === '休' && !preFilledData.hasOwnProperty(`${p}_${d}`)) {
                                if (d > 0 && scheduleGrid[p][d-1] === 'J') continue; // 保護 J 班
                                
                                for (let s of tryShifts) {
                                    if (getDailyCount(d, s) >= (maxDailyCapacity[s] || 3)) continue;
                                    if (canTakeShift(p, d, s)) {
                                        scheduleGrid[p][d] = s;
                                        totalLeaves--;
                                        replaced = true;
                                        break;
                                    }
                                }
                            }
                            if (replaced) break;
                        }
                        
                        if (!replaced) {
                            for (let d = 0; d < numDays; d++) {
                                if (scheduleGrid[p][d] === '休' && !preFilledData.hasOwnProperty(`${p}_${d}`)) {
                                    for (let s of tryShifts) {
                                        if (getDailyCount(d, s) >= (maxDailyCapacity[s] || 3)) continue;
                                        if (canTakeShift(p, d, s)) {
                                            scheduleGrid[p][d] = s;
                                            totalLeaves--;
                                            replaced = true;
                                            break;
                                        }
                                    }
                                }
                                if (replaced) break;
                            }
                        }
                        
                        if (!replaced) {
                            for (let d = 0; d < numDays; d++) {
                                if (scheduleGrid[p][d] === '休' && !preFilledData.hasOwnProperty(`${p}_${d}`)) {
                                    scheduleGrid[p][d] = 'N'; 
                                    totalLeaves--;
                                    replaced = true;
                                    break;
                                }
                            }
                        }
                        
                        if (!replaced) break; 
                        loops++;
                    }
                }

                // 🌟 4.4 時數平衡微調
                for (let p = 0; p < numPersonnel; p++) {
                    if (kitchenIndices.includes(p)) continue;
                    
                    let actualMaxLeaves = targetMaxLeaves;
                    let preLeaves = 0;
                    for (let d = 0; d < numDays; d++) { if (preFilledData[`${p}_${d}`] === '休') preLeaves++; }
                    actualMaxLeaves = Math.max(targetMaxLeaves, preLeaves);

                    let currentOt = 0;
                    for (let d = 0; d < numDays; d++) {
                        let s = scheduleGrid[p][d];
                        if (s !== null && s !== '休' && shiftDurations[s]) {
                            let ot = shiftDurations[s] - 8;
                            if (ot > 0) currentOt += ot;
                        }
                    }

                    // 加班過少：把休轉成 12H 班，檢查嚴格容量限制
                    let loops = 0;
                    while (currentOt < targetOtMin && loops < 15) {
                        let replaced = false;
                        for (let d = 0; d < numDays; d++) {
                            if (scheduleGrid[p][d] === '休' && !preFilledData.hasOwnProperty(`${p}_${d}`)) {
                                for (let s of ['A', 'E', 'C', 'O', 'F']) {
                                    if (getDailyCount(d, s) >= (maxDailyCapacity[s] || 3)) continue;
                                    if (canTakeShift(p, d, s)) {
                                        scheduleGrid[p][d] = s; 
                                        currentOt += 4;
                                        replaced = true;
                                        break;
                                    }
                                }
                                if (replaced) break;
                            }
                        }
                        if (!replaced) break;
                        loops++;
                    }

                    // 加班過多：換休或降轉為 10H 班，檢查嚴格容量限制
                    loops = 0;
                    while (currentOt > targetOtMax && loops < 15) {
                        let replaced = false;
                        let currentLeaves = 0;
                        for (let t = 0; t < numDays; t++) if (scheduleGrid[p][t] === '休') currentLeaves++;
                        
                        if (currentLeaves < actualMaxLeaves) {
                            for (let d = 0; d < numDays; d++) {
                                let s = scheduleGrid[p][d];
                                if (s !== null && s !== '休' && shiftDurations[s] > 8 && !preFilledData.hasOwnProperty(`${p}_${d}`)) {
                                    let reduceOt = shiftDurations[s] - 8;
                                    scheduleGrid[p][d] = '休'; 
                                    currentOt -= reduceOt;
                                    replaced = true;
                                    break;
                                }
                            }
                        }
                        
                        if (!replaced) {
                            for (let d = 0; d < numDays; d++) {
                                let s = scheduleGrid[p][d];
                                if (s !== null && s !== '休' && shiftDurations[s] === 12 && !preFilledData.hasOwnProperty(`${p}_${d}`)) {
                                    for (let target10H of ['N', 'Y', 'J']) {
                                        if (getDailyCount(d, target10H) >= (maxDailyCapacity[target10H] || 3)) continue;
                                        if (canTakeShift(p, d, target10H)) {
                                            scheduleGrid[p][d] = target10H; 
                                            currentOt -= 2;
                                            replaced = true;
                                            break;
                                        }
                                    }
                                    if (replaced) break;
                                }
                            }
                        }
                        if (!replaced) break;
                        loops++;
                    }
                }

                // 5. 輸出整合
                const dfOut = JSON.parse(JSON.stringify(excelSheetData));
                const otColIdx = dfOut[0].length;
                dfOut[0][otColIdx] = "當月加班時數";
                dfOut[1][otColIdx] = "總計";

                for (let p = 0; p < numPersonnel; p++) {
                    const rIdx = startRow + p;
                    let totalOt = 0;

                    for (let d = 0; d < numDays; d++) {
                        const cIdx = dateCols[d];
                        const s = scheduleGrid[p][d];

                        if (!kitchenIndices.includes(p)) {
                            if (s === '休') {
                                if (preFilledLeaveNames.hasOwnProperty(`${p}_${d}`)) {
                                    dfOut[rIdx][cIdx] = preFilledLeaveNames[`${p}_${d}`];
                                } else {
                                    dfOut[rIdx][cIdx] = '輪休';
                                }
                            } else {
                                dfOut[rIdx][cIdx] = includeTime ? (shiftLabels[s] || s) : s;
                            }
                        }

                        const finalShift = kitchenIndices.includes(p) ? (preFilledData[`${p}_${d}`] || '休') : s;
                        if (finalShift !== '休') {
                            const duration = shiftDurations[finalShift] || 0;
                            if (duration > 8) totalOt += (duration - 8);
                        }
                    }
                    dfOut[rIdx][otColIdx] = String(totalOt);
                }

                // 產生每日統計面板
                const summaryRowIdx = dfOut.length;
                dfOut[summaryRowIdx] = Array(dfOut[0].length).fill("");
                dfOut[summaryRowIdx][0] = "每日班別統計";
                dfOut[summaryRowIdx][1] = "各班人數";

                let statsOutputText = `排班成功！\n`;

                for (let d = 0; d < numDays; d++) {
                    const cIdx = dateCols[d];
                    const dateHeader = String(excelSheetData[0][cIdx] || `第 ${d+1} 天`);
                    const dailyCounts = {};

                    for (let p = 0; p < numPersonnel; p++) {
                        const rIdx = startRow + p;
                        let val = String(dfOut[rIdx][cIdx] || "");
                        val = val.trim();
                        
                        const isLeave = ['休', '假', 'nan', '輪休', '慰休', '公差'].some(k => val.includes(k));
                        if (!isLeave && val !== "" && val !== "undefined") {
                            const baseCode = val[0].toUpperCase();
                            if (dutyCodes.includes(baseCode)) {
                                dailyCounts[baseCode] = (dailyCounts[baseCode] || 0) + 1;
                            }
                        }
                    }

                    const summaryList = [];
                    Object.keys(dailyCounts).sort().forEach(baseCode => {
                        const disp = includeTime ? (shiftLabels[baseCode] || baseCode) : baseCode;
                        summaryList.push(`${disp}: ${dailyCounts[baseCode]}`);
                    });
                    
                    dfOut[summaryRowIdx][cIdx] = summaryList.join("\n");
                    statsOutputText += `【${dateHeader}】 ${summaryList.join('、 ')}\n`;
                }

                statsDisplay.textContent = statsOutputText;

                const newWorksheet = XLSX.utils.aoa_to_sheet(dfOut);
                finalOutputWorkbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(finalOutputWorkbook, newWorksheet, rawWorkbook.SheetNames[0]);

                downloadButton.classList.remove('hidden');

            } catch (error) {
                console.error(error);
                statsDisplay.textContent = `發生錯誤：\n${error.stack || error.message}`;
            } finally {
                runScheduleButton.disabled = false;
                spinner.classList.add('hidden');
            }
        }, 300); 
    }

    downloadButton.addEventListener('click', () => {
        if (!finalOutputWorkbook) return;
        XLSX.writeFile(finalOutputWorkbook, '排班結果.xlsx');
    });
    </script>
</body>
